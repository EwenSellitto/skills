name: build

on:
  push:
    branches: [main]

jobs:
  build:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - run: rustup update stable && rustup default stable
      - run: cargo build --release --manifest-path scripts/okf-cli/Cargo.toml
      - id: os
        run: echo "name=$(uname -s)" >> "$GITHUB_OUTPUT"
      - uses: actions/upload-artifact@v4
        with:
          name: okf-cli-${{ steps.os.outputs.name }}
          path: scripts/okf-cli/target/release/okf-cli

  release:
    needs: build
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: okf-cli-*
          merge-multiple: true
      - uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          files: okf-cli-*
          generate_release_notes: true
          make_latest: true
