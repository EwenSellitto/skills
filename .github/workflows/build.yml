name: build

on:
  push:
    branches: [main]
  release:
    types: [published]

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            runner: ubuntu-latest
            os: Linux
            arch: x86_64
          - target: aarch64-unknown-linux-gnu
            runner: ubuntu-24.04-arm
            os: Linux
            arch: aarch64
          - target: aarch64-apple-darwin
            runner: macos-latest
            os: macOS
            arch: aarch64
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4
      - run: rustup update stable && rustup default stable
      - run: cargo build --release --manifest-path scripts/okf-cli/Cargo.toml
      - run: cp scripts/okf-cli/target/release/okf-cli okf-cli-${{ matrix.os }}-${{ matrix.arch }}
      - uses: actions/upload-artifact@v4
        with:
          name: okf-cli-${{ matrix.os }}-${{ matrix.arch }}
          path: okf-cli-${{ matrix.os }}-${{ matrix.arch }}

  nightly:
    if: github.ref == 'refs/heads/main'
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: okf-cli-*
          merge-multiple: true
      - uses: actions/upload-artifact@v4
        with:
          name: nightly
          path: okf-cli-*

  release:
    if: github.event_name == 'release'
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: okf-cli-*
          merge-multiple: true
      - uses: softprops/action-gh-release@v2
        with:
          files: okf-cli-*
          generate_release_notes: true
